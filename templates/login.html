<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Smart Pochi — Login</title>
<style>
      * { margin:0; padding:0; box-sizing:border-box }
      body {
        background: linear-gradient(135deg, #0f2027 0%, #203a43 50%, #2c5364 100%);
        color: #fff;
        font-family: 'Segoe UI', -apple-system, sans-serif;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
      }
      .card {
        background: rgba(255,255,255,0.07);
        border: 1px solid rgba(255,255,255,0.12);
        border-radius: 20px;
        padding: 36px;
        width: 100%;
        max-width: 440px;
      }
      .logo { font-size: 22px; font-weight: 800; text-align: center; margin-bottom: 8px }
      .logo span { color: #ffd700 }
      h1 { font-size: 22px; font-weight: 800; margin-bottom: 6px; text-align: center }
      .sub { color: rgba(255,255,255,0.6); font-size: 14px; text-align: center; margin-bottom: 28px }
      .form-group { margin-bottom: 16px }
      label { display: block; font-size: 13px; font-weight: 600; color: rgba(255,255,255,0.8); margin-bottom: 6px }
      input, select {
        width: 100%;
        background: rgba(255,255,255,0.08);
        border: 1px solid rgba(255,255,255,0.15);
        border-radius: 10px;
        padding: 12px 14px;
        color: #fff;
        font-size: 14px;
        outline: none;
        font-family: inherit;
        transition: border 0.2s;
      }
      input:focus, select:focus { border-color: #ffd700 }
      input::placeholder { color: rgba(255,255,255,0.35) }
      .btn {
        width: 100%;
        padding: 13px;
        border-radius: 10px;
        background: #ffd700;
        color: #000;
        font-weight: 700;
        font-size: 15px;
        border: none;
        cursor: pointer;
        transition: background 0.2s;
        margin-top: 8px;
      }
      .btn:hover { background: #ffa500 }
      .link { color: #ffd700; text-decoration: none; font-weight: 600 }
      .bottom-link { text-align: center; margin-top: 18px; font-size: 13px; color: rgba(255,255,255,0.6) }
      .error { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3); color: #f87171; padding: 10px 14px; border-radius: 8px; font-size: 13px; margin-bottom: 14px }
      .success { background: rgba(34,197,94,0.1); border: 1px solid rgba(34,197,94,0.3); color: #22c55e; padding: 10px 14px; border-radius: 8px; font-size: 13px; margin-bottom: 14px }
    </style>
</head>
<body>
<div class="box">
  <div class="logo">
    <div class="logo-icon"></div>
    <h1>Smart<span>Pochi</span></h1>
    <p>M-Pesa Financial Intelligence</p>
  </div>
  {% if error %}
  <div class="error">⚠️ {{ error }}</div>
  {% endif %}
  <form action="/client_login" method="post">
    <div class="form-group">
      <label>Account Number</label>
      <input type="text" name="account_number" placeholder="e.g. SP-001" required/>
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" name="password" placeholder="••••••••" required/>
    </div>
    <button type="submit" class="btn">Sign In →</button>
  </form>
  <div class="links">
    <p>Don't have an account? <a href="/register_page">Register here</a></p>
  </div>
</div>
</body>
</html>
