<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Smart Pochi — Register</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#030608;color:#e8f4ff;font-family:'Segoe UI',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 80% 60% at 50% 0%,rgba(14,165,233,0.07) 0%,transparent 70%);pointer-events:none}
.box{background:#0a1220;border:1px solid rgba(14,165,233,0.28);border-radius:24px;padding:40px;width:100%;max-width:480px;position:relative;overflow:hidden}
.box::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,#0ea5e9,transparent)}
.logo{text-align:center;margin-bottom:28px}
.logo-icon{font-size:40px;margin-bottom:8px}
.logo h1{font-size:22px;font-weight:800}
.logo h1 span{color:#0ea5e9}
.logo p{color:#7a99bb;font-size:13px;margin-top:4px}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.form-group{margin-bottom:14px}
label{display:block;color:#7a99bb;font-size:11px;font-weight:600;margin-bottom:5px;text-transform:uppercase;letter-spacing:0.5px}
input{width:100%;background:#1e293b;border:1px solid rgba(14,165,233,0.2);border-radius:10px;padding:11px 14px;color:#e8f4ff;font-size:14px;outline:none;transition:border 0.2s}
input:focus{border-color:#0ea5e9}
input::placeholder{color:#3a5270}
.btn{width:100%;background:#0ea5e9;color:#000;padding:13px;border-radius:10px;border:none;font-weight:700;font-size:15px;cursor:pointer;margin-top:8px;transition:all 0.2s}
.btn:hover{background:#38bdf8;box-shadow:0 0 30px rgba(14,165,233,0.3)}
.error{background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.3);color:#ef4444;padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:16px}
.links{text-align:center;margin-top:16px;color:#3a5270;font-size:13px}
.links a{color:#0ea5e9;text-decoration:none}
.plans{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px}
.plan{background:#0e1928;border:1px solid rgba(14,165,233,0.15);border-radius:10px;padding:12px;text-align:center}
.plan-name{font-size:12px;font-weight:700;margin-bottom:2px}
.plan-price{font-size:16px;font-weight:800;color:#0ea5e9}
.plan-note{font-size:10px;color:#3a5270;margin-top:2px}
@media(max-width:480px){.grid-2{grid-template-columns:1fr!important}.plans{grid-template-columns:1fr!important}}
</style>
</head>
<body>
<div class="box">
  <div class="logo">
    <div class="logo-icon">🐼</div>
    <h1>Smart<span>Pochi</span></h1>
    <p>Create your account — get insights in minutes</p>
  </div>

  <div class="plans">
    <div class="plan">
      <div class="plan-name">Normal Plan</div>
      <div class="plan-price">KES 1,500</div>
      <div class="plan-note">per month</div>
    </div>
    <div class="plan" style="border-color:rgba(245,158,11,0.3)">
      <div class="plan-name" style="color:#f59e0b">⭐ Premium</div>
      <div class="plan-price" style="color:#f59e0b">KES 3,500</div>
      <div class="plan-note">per month</div>
    </div>
  </div>

  {% if error %}
  <div class="error">⚠️ {{ error }}</div>
  {% endif %}

  <form action="/register" method="post">
    <div class="grid-2">
      <div class="form-group">
        <label>First Name</label>
        <input type="text" name="fname" placeholder="John" required/>
      </div>
      <div class="form-group">
        <label>Last Name</label>
        <input type="text" name="lname" placeholder="Kamau" required/>
      </div>
    </div>
    <div class="form-group">
      <label>National ID / Passport</label>
      <input type="text" name="id_pass" placeholder="12345678" required/>
    </div>
    <div class="form-group">
      <label>Email Address</label>
      <input type="email" name="email" placeholder="john@example.com" required/>
    </div>
    <div class="form-group">
      <label>Phone Number</label>
      <input type="tel" name="mobile" placeholder="0712345678" required/>
    </div>
    <div class="grid-2">
      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" placeholder="••••••••" required/>
      </div>
      <div class="form-group">
        <label>Confirm Password</label>
        <input type="password" name="confirm_password" placeholder="••••••••" required/>
      </div>
    </div>
    <button type="submit" class="btn">Create Account →</button>
  </form>
  <div class="links">
    Already have an account? <a href="/login_page">Login here</a>
  </div>
</div>
</body>
</html>
