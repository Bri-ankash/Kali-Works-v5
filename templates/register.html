<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Smart Pochi — Register</title>
<style>
      * { margin:0; padding:0; box-sizing:border-box }
      body {
        background: linear-gradient(135deg, #0f2027 0%, #203a43 50%, #2c5364 100%);
        color: #fff;
        font-family: 'Segoe UI', -apple-system, sans-serif;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
      }
      .card {
        background: rgba(255,255,255,0.07);
        border: 1px solid rgba(255,255,255,0.12);
        border-radius: 20px;
        padding: 36px;
        width: 100%;
        max-width: 440px;
      }
      .logo { font-size: 22px; font-weight: 800; text-align: center; margin-bottom: 8px }
      .logo span { color: #ffd700 }
      h1 { font-size: 22px; font-weight: 800; margin-bottom: 6px; text-align: center }
      .sub { color: rgba(255,255,255,0.6); font-size: 14px; text-align: center; margin-bottom: 28px }
      .form-group { margin-bottom: 16px }
      label { display: block; font-size: 13px; font-weight: 600; color: rgba(255,255,255,0.8); margin-bottom: 6px }
      input, select {
        width: 100%;
        background: rgba(255,255,255,0.08);
        border: 1px solid rgba(255,255,255,0.15);
        border-radius: 10px;
        padding: 12px 14px;
        color: #fff;
        font-size: 14px;
        outline: none;
        font-family: inherit;
        transition: border 0.2s;
      }
      input:focus, select:focus { border-color: #ffd700 }
      input::placeholder { color: rgba(255,255,255,0.35) }
      .btn {
        width: 100%;
        padding: 13px;
        border-radius: 10px;
        background: #ffd700;
        color: #000;
        font-weight: 700;
        font-size: 15px;
        border: none;
        cursor: pointer;
        transition: background 0.2s;
        margin-top: 8px;
      }
      .btn:hover { background: #ffa500 }
      .link { color: #ffd700; text-decoration: none; font-weight: 600 }
      .bottom-link { text-align: center; margin-top: 18px; font-size: 13px; color: rgba(255,255,255,0.6) }
      .error { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3); color: #f87171; padding: 10px 14px; border-radius: 8px; font-size: 13px; margin-bottom: 14px }
      .success { background: rgba(34,197,94,0.1); border: 1px solid rgba(34,197,94,0.3); color: #22c55e; padding: 10px 14px; border-radius: 8px; font-size: 13px; margin-bottom: 14px }
    </style>
</head>
<body>
<div class="box">
  <div class="logo">
    <div class="logo-icon"></div>
    <h1>Smart<span>Pochi</span></h1>
    <p>Create your account — get insights in minutes</p>
  </div>

  <div class="plans">
    <div class="plan">
      <div class="plan-name">Normal Plan</div>
      <div class="plan-price">KES 1,500</div>
      <div class="plan-note">per month</div>
    </div>
    <div class="plan" style="border-color:rgba(245,158,11,0.3)">
      <div class="plan-name" style="color:#f59e0b">⭐ Premium</div>
      <div class="plan-price" style="color:#f59e0b">KES 3,500</div>
      <div class="plan-note">per month</div>
    </div>
  </div>

  {% if error %}
  <div class="error">⚠️ {{ error }}</div>
  {% endif %}

  <form action="/register" method="post">
    <div class="grid-2">
      <div class="form-group">
        <label>First Name</label>
        <input type="text" name="fname" placeholder="John" required/>
      </div>
      <div class="form-group">
        <label>Last Name</label>
        <input type="text" name="lname" placeholder="Kamau" required/>
      </div>
    </div>
    <div class="form-group">
      <label>National ID / Passport</label>
      <input type="text" name="id_pass" placeholder="12345678" required/>
    </div>
    <div class="form-group">
      <label>Email Address</label>
      <input type="email" name="email" placeholder="john@example.com" required/>
    </div>
    <div class="form-group">
      <label>Phone Number</label>
      <input type="tel" name="mobile" placeholder="0712345678" required/>
    </div>
    <div class="grid-2">
      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" placeholder="••••••••" required/>
      </div>
      <div class="form-group">
        <label>Confirm Password</label>
        <input type="password" name="confirm_password" placeholder="••••••••" required/>
      </div>
    </div>
    <button type="submit" class="btn">Create Account →</button>
  </form>
  <div class="links">
    Already have an account? <a href="/login_page">Login here</a>
  </div>
</div>
</body>
</html>
