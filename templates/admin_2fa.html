<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin 2FA - Smart Pochi</title>
    <link rel="stylesheet" href="/static/css/main.css">
</head>
<body>
    <div class="container">
        <h2>Admin 2FA Verification</h2>
        <p>A verification code has been sent to your admin email.</p>
        {% if error %}
            <p style="color:red;">{{ error }}</p>
        {% endif %}
        <form method="post" action="/admin_2fa_verify">
            <input type="hidden" name="username" value="{{ username }}">
            <label>Enter 2FA Code:</label>
            <input type="text" name="code" placeholder="6-digit code" required>
            <br>
            <button type="submit">Verify</button>
        </form>
<div style="margin-top:20px;background:rgba(245,158,11,0.1);border:1px solid rgba(245,158,11,0.3);border-radius:10px;padding:16px;text-align:center"><p style="color:#f59e0b;font-size:12px;margin-bottom:8px">YOUR 2FA CODE (Admin Only)</p><h1 style="color:#f59e0b;font-size:36px;letter-spacing:8px">{% if code %}{{ code }}{% else %}Check Email{% endif %}</h1></div>
    </div>
</body>
</html>
